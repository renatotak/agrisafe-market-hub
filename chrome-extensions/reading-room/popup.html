<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reading Room</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a1f;
  --ink-light: #2a2a32;
  --ink-lighter: #3a3a45;
  --parchment: #f5f0e8;
  --parchment-dark: #e8e0d4;
  --amber: #d4a043;
  --amber-glow: #e8b44d;
  --amber-dim: #a07830;
  --sage: #7a9e7e;
  --sage-dim: #5a7e5e;
  --rust: #c45c3c;
  --slate: #6b7280;
  --cream: #faf8f4;
  --radius: 6px;
  --radius-lg: 10px;
  --tr: 0.2s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--parchment);
  color: var(--ink);
  width: 380px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: var(--ink);
  color: var(--parchment);
  padding: 14px 18px;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
}
.brand .sub {
  font-size: 0.62rem;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
}
.open-lib-btn {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 6px 14px;
  border: 1.5px solid rgba(245,240,232,0.2);
  border-radius: var(--radius);
  background: none;
  color: var(--parchment);
  cursor: pointer;
  transition: all var(--tr);
  display: flex;
  align-items: center;
  gap: 5px;
}
.open-lib-btn:hover { border-color: var(--amber); color: var(--amber); }

/* Views */
.view { display:none; flex-direction:column; }
.view.active { display:flex; }

/* Quick save area */
.quick-save {
  padding: 16px 18px;
  border-bottom: 1px solid var(--parchment-dark);
  background: var(--cream);
}
.page-preview {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 14px;
}
.page-info { flex:1; }
.page-title {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 3px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.page-domain {
  font-size: 0.72rem;
  color: var(--slate);
  font-weight: 600;
}
.cat-badge {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  flex-shrink: 0;
  margin-top: 2px;
}
.cat-marketing { background:#e8d5f5; color:#6b21a8; }
.cat-tech { background:#d5e8f5; color:#1e40af; }
.cat-business { background:#d5f5e0; color:#166534; }
.cat-industry { background:#f5e8d5; color:#92400e; }
.cat-research { background:#f5d5d5; color:#991b1b; }
.cat-other { background:#e5e5e5; color:#374151; }

/* Form fields */
.fg { margin-bottom: 12px; }
.fg label {
  display: block;
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--ink-lighter);
  margin-bottom: 3px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.fg input, .fg textarea, .fg select {
  width: 100%;
  padding: 7px 10px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.82rem;
  border: 1px solid var(--parchment-dark);
  border-radius: var(--radius);
  background: white;
  color: var(--ink);
  transition: all var(--tr);
}
.fg input:focus, .fg textarea:focus { outline:none; border-color:var(--amber); box-shadow: 0 0 0 2px rgba(212,160,67,0.1); }
.fg textarea { resize:vertical; min-height: 50px; line-height:1.4; }
.fg-row { display:flex; gap:10px; }
.fg-row .fg { flex:1; }

.tags-wrap {
  display:flex; flex-wrap:wrap; gap:4px;
  padding:6px 10px; border:1px solid var(--parchment-dark);
  border-radius:var(--radius); background:white; min-height:34px; cursor:text;
  transition: all var(--tr);
}
.tags-wrap:focus-within { border-color:var(--amber); }
.tag {
  font-size:0.62rem; font-weight:600; padding:2px 7px;
  border-radius:8px; background:var(--parchment); color:var(--ink-lighter);
  border:1px solid var(--parchment-dark); display:flex; align-items:center; gap:3px;
}
.tag .rm { cursor:pointer; opacity:0.5; font-weight:bold; }
.tag .rm:hover { opacity:1; }
.tags-wrap input {
  border:none; outline:none; background:transparent;
  font-family:'Source Sans 3',sans-serif; font-size:0.78rem;
  flex:1; min-width:70px; padding:2px 0;
}

.save-btn {
  width: 100%;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  padding: 10px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  background: var(--amber);
  color: var(--ink);
  transition: all var(--tr);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.save-btn:hover { background: var(--amber-glow); }

/* Recent list */
.recent-header {
  padding: 10px 18px 6px;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--slate);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.recent-list {
  flex:1; overflow-y:auto; padding:4px 12px 12px;
  max-height: 200px;
}
.recent-list::-webkit-scrollbar { width:4px; }
.recent-list::-webkit-scrollbar-thumb { background:var(--parchment-dark); border-radius:4px; }

.recent-item {
  padding:8px 10px;
  border-radius:var(--radius);
  margin-bottom:4px;
  cursor:pointer;
  transition:all var(--tr);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}
.recent-item:hover { background:var(--cream); }
.recent-item .ri-title {
  font-size:0.8rem; font-weight:500; flex:1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.recent-item .ri-status {
  font-size:0.58rem; font-weight:700; letter-spacing:0.06em;
  text-transform:uppercase; padding:2px 6px; border-radius:8px; flex-shrink:0;
}
.status-unread { background:rgba(212,160,67,0.15); color:var(--amber-dim); }
.status-read { background:rgba(122,158,126,0.15); color:var(--sage-dim); }
.status-used { background:rgba(196,92,60,0.15); color:var(--rust); }

/* Success state */
.success-msg {
  text-align:center; padding:24px 18px;
}
.success-msg .check {
  width:48px; height:48px; border-radius:50%;
  background:var(--sage); color:white;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 12px; font-size:1.4rem;
  animation: popIn 0.3s ease;
}
@keyframes popIn { from { transform:scale(0.5); opacity:0; } to { transform:scale(1); opacity:1; } }
.success-msg h3 {
  font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:4px;
}
.success-msg p { font-size:0.8rem; color:var(--slate); }

/* Toast */
.toast {
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:var(--parchment); padding:8px 16px;
  border-radius:var(--radius); font-size:0.78rem; font-weight:500;
  z-index:100; animation: tIn 0.2s ease, tOut 0.2s ease 2s forwards;
}
@keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes tOut { from{opacity:1}to{opacity:0} }

.spinner { display:inline-block; width:14px; height:14px; border:2px solid transparent; border-top-color:currentColor; border-radius:50%; animation:spin 0.5s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

.form-scroll { overflow-y:auto; max-height:380px; padding:0 18px 16px; }
.form-scroll::-webkit-scrollbar { width:4px; }
.form-scroll::-webkit-scrollbar-thumb { background:var(--parchment-dark); border-radius:4px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-row">
    <div class="brand">
      <h1>The Reading Room</h1>
      <span class="sub">Research Library</span>
    </div>
    <button class="open-lib-btn" id="openLibrary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Open Library
    </button>
  </div>
</header>

<!-- SAVE VIEW -->
<div class="view active" id="viewSave">
  <div class="quick-save" id="quickSave">
    <div class="page-preview">
      <div class="page-info">
        <div class="page-title" id="pageTitle">Loading page…</div>
        <div class="page-domain" id="pageDomain"></div>
      </div>
      <span class="cat-badge" id="pageCat"></span>
    </div>
  </div>
  <div class="form-scroll">
    <div style="height:12px"></div>
    <div class="fg">
      <label>Title</label>
      <input type="text" id="fTitle">
    </div>
    <div class="fg-row">
      <div class="fg">
        <label>Category</label>
        <select id="fCategory">
          <option value="marketing">Marketing</option>
          <option value="tech">Tech</option>
          <option value="business">Business</option>
          <option value="industry">Industry</option>
          <option value="research">Research</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="fg">
        <label>Status</label>
        <select id="fStatus">
          <option value="unread">Unread</option>
          <option value="read">Read</option>
          <option value="used">Used in Article</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label>Key Excerpt</label>
      <textarea id="fExcerpt" rows="2" placeholder="Key passages…"></textarea>
    </div>
    <div class="fg">
      <label>Your Notes</label>
      <textarea id="fNotes" rows="2" placeholder="Thoughts, connections…"></textarea>
    </div>
    <div class="fg">
      <label>Key Takeaways</label>
      <textarea id="fTakeaways" rows="2" placeholder="Main insights…"></textarea>
    </div>
    <div class="fg">
      <label>Tags (Enter to add)</label>
      <div class="tags-wrap" id="tagsWrap">
        <input type="text" id="tagsInput" placeholder="Add tag…">
      </div>
    </div>
    <button class="save-btn" id="saveBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save to Library
    </button>
  </div>
</div>

<!-- SUCCESS VIEW -->
<div class="view" id="viewSuccess">
  <div class="success-msg">
    <div class="check">&#10003;</div>
    <h3>Saved to Library</h3>
    <p id="successTitle"></p>
  </div>
  <div class="recent-header">RECENTLY SAVED</div>
  <div class="recent-list" id="recentList"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
